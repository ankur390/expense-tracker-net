<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
    color: #333;
}

.balance h2 {
    color: #4CAF50;
    margin: 10px 0;
}

.form input, .form select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.list {
    margin-top: 20px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    color: white;
}

.income {
    background: #4CAF50;
}

.expense {
    background: #f44336;
}

.delete {
    cursor: pointer;
    font-weight: bold;
}

/* Footer */
.footer {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: white;
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 Expense Tracker</h1>

    <div class="balance">
        <h3>Your Balance</h3>
        <h2 id="balance">₹0</h2>
    </div>

    <div class="form">
        <input type="text" id="text" placeholder="Enter description">
        <input type="number" id="amount" placeholder="Enter amount">
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <button class="btn" onclick="addTransaction()">Add</button>
    </div>

    <div class="list" id="list"></div>
</div>

<!-- Footer -->
<footer class="footer">
    © 2026 All Rights Reserved | Created by Ankur Gautam
</footer>

<script>
let transactions = [];

function addTransaction() {
    const text = document.getElementById('text').value;
    const amount = document.getElementById('amount').value;
    const type = document.getElementById('type').value;

    if(text === "" || amount === "") {
        alert("Please enter all fields");
        return;
    }

    const transaction = {
        id: Date.now(),
        text,
        amount: +amount,
        type
    };

    transactions.push(transaction);
    updateUI();

    document.getElementById('text').value = "";
    document.getElementById('amount').value = "";
}

function updateUI() {
    const list = document.getElementById('list');
    list.innerHTML = "";

    let balance = 0;

    transactions.forEach(t => {
        balance += t.type === "income" ? t.amount : -t.amount;

        const div = document.createElement('div');
        div.classList.add('item', t.type);

        div.innerHTML = `
            ${t.text} - ₹${t.amount}
            <span class="delete" onclick="deleteTransaction(${t.id})">x</span>
        `;

        list.appendChild(div);
    });

    document.getElementById('balance').innerText = "₹" + balance;
}

function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    updateUI();
}
</script>

</body>
</html>
